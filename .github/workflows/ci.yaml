name: CI
run-name: Deploy to the github for end2end-mlops

on:
  push:
    branches: [main]

jobs:
  ci:
    name: Lint, test and build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run Ruff Linting
        run: python -m ruff check .

      - name: Run pytest
        run: python -m pytest --cov=src --cov-report=term-missing

      - name: creating model placeholders for building
        run: |
          mkdir -p models/saved
          touch models/saved/best_model.joblib
          touch models/saved/preprocessor.joblib

      - name: Building Docker Image
        run: docker build -t house-prediction-api:ci .
